{% extends "custom_edit.html" %}

{% block head %}
{{ super() }}

<!-- CKEditor 5 (Classic) -->
<script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>

<style>
    /* Ensure CKEditor takes the full width and has a reasonable height */
    .ck-editor__editable_inline {
        min-height: 300px;
        max-height: 600px;
    }
    /* Fix for CKEditor z-index in some modal situations if needed, but here mostly for styling */
    .ck.ck-editor {
        width: 100% !important;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Find the correct form — use the one containing our known fields to avoid header/search forms
        var fullDescTextarea = document.getElementById("full_description");
        var imageInput = document.getElementById("image");
        var form = (fullDescTextarea && fullDescTextarea.form) || (imageInput && imageInput.form) || document.querySelector('form');

        if (form) {
            // Force multipart/form-data to allow file uploads
            form.enctype = "multipart/form-data";
            
            // Find the image URL field container
            var imageInput = document.getElementById("image");
            if (imageInput) {
                // Remove required attribute since we allow file upload as an alternative
                imageInput.removeAttribute("required");
                
                var fieldContainer = imageInput.closest('.mb-3');
                if (fieldContainer) {
                    // Create and inject the file upload field
                    var uploadDiv = document.createElement('div');
                    uploadDiv.className = 'mb-3';
                    uploadDiv.innerHTML = `
                        <label class="form-label" for="image_file">Or Upload Image File</label>
                        <input class="form-control" id="image_file" name="image_file" type="file">
                        <div class="form-text">Choose a file to upload to assets/images/. This will override the URL field above.</div>
                    `;
                    // Insert after the image URL field
                    fieldContainer.parentNode.insertBefore(uploadDiv, fieldContainer.nextSibling);
                }
            }

            // Initialize CKEditor for full_description
            var fullDescTextarea = document.getElementById("full_description");
            if (fullDescTextarea) {
                // Remove required attribute to prevent hidden validation blocking
                fullDescTextarea.removeAttribute("required");

                ClassicEditor
                    .create(fullDescTextarea, {
                        toolbar: ['heading', '|', 'bold', 'italic', 'underline', 'link', 'bulletedList', 'numberedList', 'blockQuote', 'undo', 'redo'],
                        heading: {
                            options: [
                                { model: 'paragraph', title: 'Paragraph', class: 'ck-heading_paragraph' },
                                { model: 'heading1', view: 'h1', title: 'Heading 1', class: 'ck-heading_heading1' },
                                { model: 'heading2', view: 'h2', title: 'Heading 2', class: 'ck-heading_heading2' },
                                { model: 'heading3', view: 'h3', title: 'Heading 3', class: 'ck-heading_heading3' }
                            ]
                        }
                    })
                    .then(editor => {
                        console.log('CKEditor initialized for full_description');
                        
                        // Sync data on every change to ensure textarea is never empty if editor has content
                        editor.model.document.on('change:data', () => {
                            fullDescTextarea.value = editor.getData();
                        });

                        // Also sync on submit just in case
                        form.addEventListener('submit', () => {
                            fullDescTextarea.value = editor.getData();
                        });
                    })
                    .catch(error => {
                        console.error('CKEditor initialization error:', error);
                    });
            }
        }
    });
</script>
{% endblock %}
