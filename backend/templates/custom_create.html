{% extends "sqladmin/create.html" %}

{% block head %}
{{ super() }}

<style>
    /* ============================= */
    /* SELECT2 FIX — CATEGORY FIELD */
    /* ============================= */

    /* Allow Select2 container to expand inside flex row */
    .select2-container {
        width: 100% !important;
        flex: 1 1 auto !important;
        min-width: 0 !important;
        /* critical for flex layouts */
    }

    /* Make the selection box fill container */
    .select2-container--default .select2-selection--multiple {
        width: 100% !important;
        box-sizing: border-box;
        min-height: 38px;
        height: 38px;
        overflow: hidden;
    }

    /* Keep selected items in ONE row */
    .select2-container--default .select2-selection--multiple .select2-selection__rendered {
        display: flex !important;
        flex-wrap: nowrap !important;
        align-items: center;
        gap: 4px;

        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;

        padding: 4px !important;
    }

    /* Each selected chip */
    .select2-container--default .select2-selection--multiple .select2-selection__choice {
        flex: 0 0 auto !important;
        margin: 0 !important;
        padding: 2px 8px !important;
        display: inline-flex !important;
        align-items: center;
    }

    /* Keep inline search from forcing new row */
    .select2-container--default .select2-selection--multiple .select2-search--inline {
        flex: 0 0 auto !important;
    }

    .select2-container--default .select2-selection--multiple .select2-search--inline .select2-search__field {
        width: 8ch !important;
        min-width: 8ch !important;
        margin: 0 !important;
        padding: 4px !important;
    }

    /* Fix dropdown padding */
    .select2-container--default .select2-dropdown {
        padding: 6px !important;
    }
</style>

{% endblock %}
