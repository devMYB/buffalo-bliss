<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Request an advertisement with Buffalo Bliss. Advertise your business on our website or social media channels.">
    <title>Request Advertisement | Your Bliss in 716</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header" id="globalNav">
        <!-- Site navigation rendered from script.js -->
    </header>

    <main>
        <!-- Form Section -->
        <section class="section section-lg">
            <div class="container">
                <div class="card card-glass" style="max-width: 800px; margin: 0 auto;">
                    <div class="card-content">
                        <div class="text-center mb-10">
                            <h1 style="font-size: var(--font-size-4xl);">Advertise with Us</h1>
                            <p>Fill out the form below to request advertising on Buffalo Bliss.</p>
                        </div>

                        <form id="advertisementForm" class="grid gap-6">
                            <div class="grid grid-2 gap-6">
                                <div class="form-group">
                                    <label for="fullName" class="form-label">Full Name <span
                                            style="color: red;">*</span></label>
                                    <input type="text" id="fullName" name="fullName" class="form-input"
                                        placeholder="Your Name" required>
                                </div>
                                <div class="form-group">
                                    <label for="email" class="form-label">Email Address <span
                                            style="color: red;">*</span></label>
                                    <input type="email" id="email" name="email" class="form-input"
                                        placeholder="your@email.com" required>
                                </div>
                            </div>

                            <div class="grid grid-2 gap-6">
                                <div class="form-group">
                                    <label for="businessName" class="form-label">Business Name <span
                                            style="color: red;">*</span></label>
                                    <input type="text" id="businessName" name="businessName" class="form-input"
                                        placeholder="Your Business" required>
                                </div>
                                <div class="form-group">
                                    <label for="sector" class="form-label">Company Sector <span
                                            style="color: red;">*</span></label>
                                    <select id="sector" name="sector" class="form-select" required>
                                        <option value="" disabled selected>Select Sector</option>
                                        <option value="finance">Finance</option>
                                        <option value="it">IT</option>
                                        <option value="marketing">Marketing</option>
                                        <option value="trading">Trading</option>
                                        <option value="banking">Banking</option>
                                        <option value="education">Education</option>
                                        <option value="healthcare">Healthcare</option>
                                        <option value="retail">Retail</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div id="otherSectorContainer" style="display: none;">
                                <div class="form-group">
                                    <label for="otherSector" class="form-label">If other, please specify <span
                                            style="color: red;">*</span></label>
                                    <input type="text" id="otherSector" name="otherSector" class="form-input"
                                        placeholder="Please specify your sector">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="companyLink" class="form-label">Company Website/Social Media/Link</label>
                                <input type="url" id="companyLink" name="companyLink" class="form-input"
                                    placeholder="https://yourcompany.com or social link">
                            </div>

                            <div class="form-group">
                                <label for="message" class="form-label">Your Message <span
                                        style="color: red;">*</span></label>
                                <textarea id="message" name="message" class="form-textarea"
                                    placeholder="Tell us more about what you'd like to advertise..."
                                    required></textarea>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-full">
                                    Submit Request <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <!-- Site footer rendered from script.js -->
    </footer>

    <!-- JavaScript -->
    <script src="../data.js"></script>
    <script src="../script.js"></script>
    <script>
        // Handle conditional "Other" sector field
        const sectorSelect = document.getElementById('sector');
        const otherSectorContainer = document.getElementById('otherSectorContainer');
        const otherSectorInput = document.getElementById('otherSector');

        sectorSelect.addEventListener('change', function () {
            if (this.value === 'other') {
                otherSectorContainer.style.display = 'block';
                otherSectorInput.required = true;
            } else {
                otherSectorContainer.style.display = 'none';
                otherSectorInput.required = false;
                otherSectorInput.value = '';
            }
        });

        document.getElementById('advertisementForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const businessName = document.getElementById('businessName').value.trim();
            const sector = document.getElementById('sector').value;
            const otherSector = document.getElementById('otherSector').value.trim();
            const companyLink = document.getElementById('companyLink').value.trim();
            const message = document.getElementById('message').value.trim();

            // 1. Check for empty required fields
            if (!fullName || !email || !businessName || !sector || !message || (sector === 'other' && !otherSector)) {
                alert("Please fill in all required fields marked with *.");
                return;
            }

            // 2. Email Validation: check for @ and .com
            if (!email.includes("@") || !email.toLowerCase().endsWith(".com")) {
                alert("Please enter a valid email address ending with .com");
                return;
            }

            // Extra Email Check: basic regex for structure
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert("The email format is invalid. Please check again.");
                return;
            }

            const data = {
                full_name: fullName,
                email: email,
                business_name: businessName,
                sector: sector,
                other_sector: sector === 'other' ? otherSector : null,
                company_link: companyLink || null,
                message: message
            };

            try {
                const response = await fetch("http://localhost:8000/api/advertising-request", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`Success! Thank you, ${fullName}. Your request has been submitted.`);
                    this.reset();
                    otherSectorContainer.style.display = 'none';
                } else {
                    const errorData = await response.json();
                    alert(`Error: ${errorData.detail || "Something went wrong. Please try again later."}`);
                }
            } catch (error) {
                console.error("Submission error:", error);
                alert("Could not connect to the server. Please make sure the backend is running.");
            }
        });
    </script>
</body>

</html>
