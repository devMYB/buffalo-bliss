<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Discover events happening in Buffalo, NY. From cultural festivals to fitness classes and Desi community events.">
    <title>Buffalo Events | Your Bliss in 716</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="../styles.css">

    <style>
        .page-header {
            background: var(--gradient-hero);
            padding: var(--space-16) 0 var(--space-12);
            text-align: center;
        }

        .event-card {
            display: flex;
            gap: var(--space-6);
            padding: var(--space-6);
        }

        .event-date {
            flex-shrink: 0;
            width: 80px;
            min-height: 80px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-white);
            font-weight: var(--font-weight-bold);
            padding: 10px 6px;
            text-align: center;
            align-self: flex-start;
        }

        .event-month {
            font-size: 0.62rem;
            letter-spacing: 0.04em;
            line-height: 1.35;
            text-align: center;
        }

        .event-details {
            flex: 1;
        }

        .event-time {
            color: var(--color-text-tertiary);
            font-size: var(--font-size-sm);
            margin-bottom: var(--space-2);
        }

        .filter-bar {
            background: var(--color-surface);
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-8);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .filter-btn {
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            background: var(--color-neutral-100);
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gradient-primary);
            color: var(--color-white);
        }

        [data-theme="dark"] .filter-btn {
            background: var(--color-neutral-700);
        }

        @media (max-width: 767px) {
            .event-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header" id="globalNav">
        <!-- Site navigation rendered from script.js -->
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Buffalo Events</h1>
            <p
                style="font-size: var(--font-size-lg); color: var(--color-text-secondary); max-width: 600px; margin: 0 auto;">
                Discover cultural festivals, fitness classes, and community gatherings
            </p>
        </div>
    </section>

    <!-- Featured Events -->
    <section class="section">
        <div class="container">
            <h2 class="mb-8">Featured Events</h2>

            <div class="grid grid-2" id="featuredEventsContainer">
                <!-- Data rendered from script.js -->
            </div>
        </div>
    </section>

    <!-- All Events -->
    <section class="section" style="background: var(--color-neutral-100);">
        <div class="container">
            <h2 class="mb-8">Upcoming Events</h2>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All Events</button>
                <button class="filter-btn" data-filter="cultural art">Art & Cultural</button>
                <button class="filter-btn" data-filter="music, food, entertainment">Food & Entertainment</button>
                <button class="filter-btn" data-filter="fitness, health, wellness, sports">Health & Wellness</button>
                <button class="filter-btn" data-filter="sports, fitness">Sports & Fitness</button>
                <button class="filter-btn" data-filter="faith, spirituality, religion">Faith & Spirituality</button>

            </div>

            <!-- Events List -->
            <div class="flex-col gap-4" id="eventsListContainer">
                <!-- Data rendered from script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- Site footer rendered from script.js -->
    </footer>

    <!-- JavaScript -->
    <script src="../data.js"></script>
    <script src="../script.js"></script>
</body>

</html>
