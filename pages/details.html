<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detailed information about Buffalo's top attractions and more.">
    <title>Details | Buffalo Bliss Hub</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="../styles.css">

    <style>
        .detail-hero {
            position: relative;
            height: 50vh;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .detail-hero-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
            z-index: 0;
        }

        .detail-hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 0 var(--space-4);
        }

        .detail-hero-content h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: var(--space-4);
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-12);
            padding: var(--space-16) 0;
        }

        @media (min-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr 350px;
            }
        }

        .detail-article {
            line-height: 1.8;
            font-size: var(--font-size-lg);
        }

        .detail-article p {
            margin-bottom: var(--space-6);
        }

        .sidebar-box {
            background: var(--color-surface);
            padding: var(--space-8);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-8);
            border: 1px solid var(--color-neutral-100);
        }

        [data-theme="dark"] .sidebar-box {
            border-color: var(--color-neutral-700);
        }

        .sidebar-title {
            font-size: var(--font-size-xl);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-family: var(--font-family-heading);
        }

        .info-list {
            list-style: none;
            padding: 0;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            margin-bottom: var(--space-4);
            font-size: var(--font-size-md);
        }

        .info-icon {
            color: var(--color-primary);
            margin-top: 4px;
        }

        .newsletter-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .detail-cta {
            margin-top: var(--space-8);
            display: inline-block;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header" id="globalNav">
        <!-- Site navigation rendered from script.js -->
    </header>

    <!-- Detailed Content Container -->
    <main id="detailPageContent">
        <!-- Will be populated by script.js -->
        <div class="container py-20 text-center">
            <div class="loading-spinner"></div>
            <p>Gathering the magic...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <!-- Site footer rendered from script.js -->
    </footer>

    <!-- JavaScript -->
    <script src="../data.js"></script>
    <script src="../script.js"></script>
</body>

</html>
